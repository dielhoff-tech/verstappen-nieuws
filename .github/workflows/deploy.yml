name: Dagelijkse deploy – 18:00 Amsterdam

on:
  schedule:
    # 16:00 UTC = 18:00 Amsterdam (zomertijd CEST)
    - cron: '0 16 * * *'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Python dependencies installeren
        run: pip install requests beautifulsoup4 lxml

      - name: Nieuws scrapen en HTML genereren
        run: python3 scraper.py

      - name: Commit en push
        run: |
          git config user.name  "Verstappen Deploy Bot"
          git config user.email "deploy@verstappen-nieuws.local"
          git add index.html
          git diff --cached --quiet || git commit -m "Dagelijkse update $(TZ='Europe/Amsterdam' date '+%Y-%m-%d %H:%M')"
          git push

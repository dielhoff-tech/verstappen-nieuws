name: Dagelijkse deploy – 08:00 en 18:00 Amsterdam

on:
  schedule:
    # 06:00 UTC = 08:00 Amsterdam (CEST)
    - cron: '0 6 * * *'
    # 16:00 UTC = 18:00 Amsterdam (CEST)
    - cron: '0 16 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Python dependencies installeren
        run: pip install requests beautifulsoup4 lxml deep-translator

      - name: Nieuws scrapen en HTML genereren
        run: python3 scraper.py

      - name: Commit en push
        run: |
          git config user.name  "Verstappen Deploy Bot"
          git config user.email "deploy@verstappen-nieuws.local"
          git add index.html
          git diff --cached --quiet || git commit -m "Dagelijkse update $(TZ='Europe/Amsterdam' date '+%Y-%m-%d %H:%M')"
          git push

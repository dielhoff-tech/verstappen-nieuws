name: Dagelijkse deploy – 18:00 Amsterdam

on:
  schedule:
    # 16:00 UTC = 18:00 Amsterdam (zomertijd CEST)
    - cron: '0 16 * * *'
  workflow_dispatch: # ook handmatig te starten

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Schrijf update-timestamp
        run: |
          echo "Laatste deploy: $(TZ='Europe/Amsterdam' date '+%Y-%m-%d %H:%M:%S %Z')" > last-updated.txt

      - name: Commit en push
        run: |
          git config user.name  "Verstappen Deploy Bot"
          git config user.email "deploy@verstappen-nieuws.local"
          git add last-updated.txt
          git diff --cached --quiet || git commit -m "Dagelijkse update $(TZ='Europe/Amsterdam' date '+%Y-%m-%d')"
          git push

name: Dagelijkse deploy – 08:00 en 18:00 Amsterdam

on:
  schedule:
    - cron: '0 6 * * *'   # 08:00 Amsterdam (CEST)
    - cron: '0 16 * * *'  # 18:00 Amsterdam (CEST)
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Python installeren
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Packages installeren
        run: pip install requests deep-translator lxml

      - name: Scraper draaien
        run: python3 scraper.py

      - name: Commit en push
        run: |
          git config user.name  "Verstappen Deploy Bot"
          git config user.email "deploy@verstappen-nieuws.local"
          cp index.html /tmp/index_nieuw.html
          git checkout -- index.html
          git pull origin main --rebase
          cp /tmp/index_nieuw.html index.html
          git add index.html
          git diff --cached --quiet && echo "Geen wijzigingen" && exit 0
          git commit -m "Dagelijkse update $(TZ='Europe/Amsterdam' date '+%Y-%m-%d %H:%M')"
          git push origin main
